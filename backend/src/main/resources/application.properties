spring.application.name=last-mile-food-rescue

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/food_rescue}
spring.datasource.username=${DATABASE_USERNAME:food_rescue}
spring.datasource.password=${DATABASE_PASSWORD:food_rescue}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
